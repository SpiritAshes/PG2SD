# 训练配置
total_epochs: 40  # 总训练轮数
batch_size: 4  # 批量大小
learning_rate: 0.001  # 初始学习率
weight_decay: 0.0005  # 权重衰减
step_size: [15, 35]  # 学习率衰减的里程碑
gamma: 0.1  # 学习率衰减的倍数

# GPU 配置
gpu: [0]  # 使用的 GPU ID，可以是单个 GPU 或多个 GPU
iscuda: True  # 是否使用 GPU
threads: 8  # 数据加载的线程数

# 模型保存路径
save_path: "./checkpoints/"  # 模型保存路径
pretrained: False  # 是否加载预训练模型
pretrained_path: "./pretrained/model.pth"  # 预训练模型路径

# TensorBoard 日志路径
tensorboard_log_dir: "./logs/"

# 数据集配置
# train_data: ['web_images', 'aachen_db_images', 'aachen_style_transfer_pairs', 'aachen_flow_pairs']
train_data: ['web_images']
data_sources:
  web_images:
    params:
      start: 0
      end: 52
    args:
      transforms:
        - "RandomScale(256, 1024, can_upscale=True)"
        - "RandomTilting(0.5), PixelNoise(25)"
  aachen_db_images:
    args:
      transforms:
        - "RandomScale(256, 1024, can_upscale=True)"
        - "RandomTilting(0.5), PixelNoise(25)"
  aachen_style_transfer_pairs:
    args:
      transforms:
        - "RandomScale(256, 1024, can_upscale=True), RandomTilting(0.5), PixelNoise(25)"
  aachen_flow_pairs:
    args:
    
# 数据加载器配置
data_loader:
  type: PairLoader
  args:
    scale: "RandomScale(256, 1024, can_upscale=True)"
    distort: "ColorJitter(0.2, 0.2, 0.2, 0.1)"
    crop: "RandomCrop(224)"

# 损失函数配置
reliability_nq: 10  # ReliabilityLoss 的参数
reliability_base: 0.7  # ReliabilityLoss 的参数

cosim_patch_size: 16  # CosimLoss 的参数

peak_patch_size: 16  # PeakLoss 的参数

gradient_control_factor: 0.2  # PGLLoss 的控制因子

PGL_patch_size: 16  # PGLLoss 的参数

temperature: 1.5  # Distillation_Loss 的温度参数
G2SDL_loss_weight: 0.1 # G2SDL_loss 的权重参数
beta: 0.5  # Distillation_Loss 的 beta 参数